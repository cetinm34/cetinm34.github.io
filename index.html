<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferdi Wesker | Global Saturation</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #bc0000; 
            --bg: #0a0a0a; 
            --card-bg: #121212; 
            --text: #e0e0e0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }
        
        nav { 
            position: fixed; top: 0; width: 100%; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .logo { 
            font-family: 'Bebas Neue', cursive; font-size: 2.2rem; 
            color: var(--primary); letter-spacing: 3px; 
            text-shadow: 0 0 15px rgba(188, 0, 0, 0.4);
        }

        .hero { 
            height: 45vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), 
                        url('thumb-1920-455968.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed;
        }
        .hero h1 { 
            font-family: 'Bebas Neue', cursive; font-size: 5rem; 
            margin-bottom: 5px;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { 
            font-family: 'Bebas Neue', cursive; font-size: 2.5rem; 
            color: var(--primary); margin-bottom: 40px; 
            display: flex; align-items: center; gap: 15px;
        }
        .section-title::after { content: ''; height: 2px; flex: 1; background: rgba(188,0,0,0.2); }

        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 30px; 
        }
        .video-card { 
            background: var(--card-bg); border-radius: 12px; 
            overflow: hidden; transition: 0.4s; 
            border: 1px solid rgba(255,255,255,0.03); 
            position: relative;
        }
        
        /* Video Oynatıcı Alanı */
        .video-player-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }
        .video-player-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .video-info { padding: 20px; }
        .video-info h4 { 
            font-size: 1rem; line-height: 1.4; color: #fff;
            margin-bottom: 10px; height: 2.8em; overflow: hidden;
        }
        
        .status-badge {
            font-size: 0.7rem; color: var(--primary); font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }

        footer { 
            padding: 60px 20px; text-align: center; background: #050505; 
            border-top: 1px solid rgba(255,255,255,0.05); margin-top: 80px; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">FERDI WESKER</div>
        <div style="color: var(--primary); font-weight: bold; letter-spacing: 2px;">SECURE STREAM</div>
    </nav>

    <div class="hero">
        <h1>TRANSMISSIONS</h1>
        <p style="color: var(--primary); font-weight: bold; letter-spacing: 4px;">LOCAL PLAYBACK ENABLED</p>
    </div>

    <div class="container">
        <h2 class="section-title">Encrypted Feed</h2>
        <div id="video-grid">
            <p style="text-align: center; grid-column: 1/-1; opacity: 0.5;">Decrypted Data incoming...</p>
        </div>
    </div>

    <footer>
        <p>© 2026 FERDI WESKER. COMPLETE GLOBAL SATURATION.</p>
    </footer>

    <script>
        const channelID = "UC_gBbeFVg61_vb8yBiCqU3Q"; 
        const videoGrid = document.getElementById('video-grid');
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`;
        
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`)
            .then(res => res.json())
            .then(data => {
                videoGrid.innerHTML = '';
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const videoId = item.link.split('v=')[1];
                        const card = `
                            <div class="video-card">
                                <div class="video-player-container">
                                    <iframe 
                                        src="https://www.youtube.com/embed/${videoId}" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowfullscreen>
                                    </iframe>
                                </div>
                                <div class="video-info">
                                    <span class="status-badge">Data Stream</span>
                                    <h4>${item.title}</h4>
                                </div>
                            </div>
                        `;
                        videoGrid.innerHTML += card;
                    });
                } else {
                    videoGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No data found.</p>';
                }
            })
            .catch(() => {
                videoGrid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1;">Connection Lost.</p>';
            });
    </script>
</body>
</html>
