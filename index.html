<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferdi Wesker | Global Saturation</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #800000; /* Darker, blood-like red */
            --primary-glow: rgba(128, 0, 0, 0.6);
            --bg: #050505; /* Near black */
            --card-bg: #0a0a0a; /* Very dark grey */
            --text: #c0c0c0; /* Slightly darker text for atmosphere */
            --highlight: #fff; /* Pure white for titles */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png'); /* Subtle texture */
        }
        
        /* NAVBAR */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 15px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(5px); 
            z-index: 1000; border-bottom: 2px solid var(--primary); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .logo { 
            font-family: 'Nosifer', cursive; font-size: 1.8rem; 
            color: var(--primary); letter-spacing: 2px; 
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* HERO SECTION */
        .hero { 
            height: 60vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.8), var(--bg)), 
                        url('thumb-1920-455968.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hero h1 { 
            font-family: 'Creepster', cursive; font-size: 6rem; 
            color: var(--highlight); margin-bottom: 10px;
            text-shadow: 0 0 20px var(--primary-glow), 5px 5px 0px #000;
            letter-spacing: 5px;
        }
        .hero p {
            font-size: 1.1rem; color: var(--primary); 
            font-weight: bold; letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 2px #000;
        }

        /* CONTAINER & TITLES */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .section-title { 
            font-family: 'Creepster', cursive; font-size: 3rem; 
            color: var(--highlight); margin-bottom: 50px; 
            display: flex; align-items: center; gap: 20px;
            text-shadow: 3px 3px 0px #000;
        }
        .section-title::before, .section-title::after { 
            content: ''; height: 3px; flex: 1; background: var(--primary); 
            box-shadow: 0 0 10px var(--primary);
        }

        /* VIDEO GRID */
        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
            gap: 40px; 
        }
        .video-card { 
            background: var(--card-bg); border-radius: 5px; /* Less rounded for classic feel */
            overflow: hidden; transition: 0.5s; 
            border: 1px solid rgba(255,255,255,0.02); 
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .video-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
            transform: scale(1.02);
        }
        
        /* Video Oynatıcı */
        .video-player-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-bottom: 2px solid var(--primary);
        }
        .video-player-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .video-info { padding: 25px; background: linear-gradient(to bottom, #101010, #0a0a0a); }
        .video-info h4 { 
            font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 700;
            line-height: 1.4; color: var(--highlight);
            margin-bottom: 10px; height: 3em; overflow: hidden;
            text-shadow: 1px 1px 2px #000;
        }
        
        .status-badge {
            font-family: 'Creepster', cursive; font-size: 1.1rem; 
            color: var(--primary); letter-spacing: 2px;
            display: block; margin-bottom: 5px;
        }

        /* FOOTER */
        footer { 
            padding: 80px 20px; text-align: center; background: #020202; 
            border-top: 2px solid var(--primary); margin-top: 100px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }
        footer p { font-size: 0.9rem; letter-spacing: 1px; }
        .footer-logo { font-family: 'Nosifer', cursive; color: var(--primary); font-size: 1.2rem; margin-bottom: 15px; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">WESKER</div>
        <div style="color: var(--highlight); font-family: 'Creepster'; font-size: 1.3rem; letter-spacing: 2px;">SYSTEM STATUS: ONLINE</div>
    </nav>

    <div class="hero">
        <h1>TRANSMISSIONS</h1>
        <p>PROJECT: GLOBAL SATURATION</p>
    </div>

    <div class="container">
        <h2 class="section-title">Decrypted Feed</h2>
        <div id="video-grid">
            <p style="text-align: center; grid-column: 1/-1; opacity: 0.5; font-family: 'Creepster'; font-size: 1.5rem;">Accessing Biohazard Database...</p>
        </div>
    </div>

    <footer>
        <div class="footer-logo">FERDI WESKER</div>
        <p>© 2026. COMPLETE GLOBAL SATURATION.</p>
        <p style="font-size: 0.7rem; opacity: 0.3; margin-top: 10px;">PROPERTY OF UMBRELLA CORP. UNAUTHORIZED ACCESS PROHIBITED.</p>
    </footer>

    <script>
        const channelID = "UC_gBbeFVg61_vb8yBiCqU3Q"; 
        const videoGrid = document.getElementById('video-grid');
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`;
        
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`)
            .then(res => res.json())
            .then(data => {
                videoGrid.innerHTML = '';
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const videoId = item.link.split('v=')[1];
                        const card = `
                            <div class="video-card">
                                <div class="video-player-container">
                                    <iframe 
                                        src="https://www.youtube.com/embed/${videoId}?modestbranding=1&rel=0&showinfo=0&color=white" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowfullscreen>
                                    </iframe>
                                </div>
                                <div class="video-info">
                                    <span class="status-badge">Data File</span>
                                    <h4>${item.title}</h4>
                                }
                            </div>
                        `;
                        videoGrid.innerHTML += card;
                    });
                } else {
                    videoGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; font-family: Creepster;">No data found.</p>';
                }
            })
            .catch(() => {
                videoGrid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1; font-family: Creepster;">Connection Lost.</p>';
            });
    </script>
</body>
</html>
