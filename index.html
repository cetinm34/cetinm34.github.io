<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferdi Wesker | Global Saturation</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #bc0000; 
            --bg: #0a0a0a; 
            --card-bg: #121212; 
            --text: #e0e0e0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }
        
        nav { 
            position: fixed; top: 0; width: 100%; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .logo { 
            font-family: 'Bebas Neue', cursive; font-size: 2.2rem; 
            color: var(--primary); letter-spacing: 3px; 
            text-shadow: 0 0 15px rgba(188, 0, 0, 0.4);
        }

        .hero { 
            height: 50vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), 
                        url('thumb-1920-455968.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed;
        }
        .hero h1 { 
            font-family: 'Bebas Neue', cursive; font-size: 5rem; 
            margin-bottom: 5px; animation: fadeIn 1.5s ease;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { 
            font-family: 'Bebas Neue', cursive; font-size: 2.5rem; 
            color: var(--primary); margin-bottom: 40px; 
            display: flex; align-items: center; gap: 15px;
        }
        .section-title::after { content: ''; height: 2px; flex: 1; background: rgba(188,0,0,0.2); }

        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
        }
        .video-card { 
            background: var(--card-bg); border-radius: 12px; 
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.03); 
        }
        .video-card:hover { 
            transform: translateY(-10px); border-color: var(--primary); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .thumb-container { position: relative; overflow: hidden; }
        .video-card img { width: 100%; transition: 0.5s; }
        .video-card:hover img { transform: scale(1.1); }
        
        .video-info { padding: 20px; }
        .video-info h4 { 
            font-size: 1rem; line-height: 1.4; height: 2.8em; 
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; margin-bottom: 15px; color: #fff;
        }
        .watch-btn { 
            display: block; width: 100%; padding: 12px; 
            background: var(--primary); color: white; text-align: center; 
            text-decoration: none; font-weight: bold; border-radius: 6px; 
            transition: 0.3s; font-family: 'Bebas Neue'; font-size: 1.2rem;
        }
        .watch-btn:hover { background: #e60000; box-shadow: 0 0 15px var(--primary); }

        footer { 
            padding: 60px 20px; text-align: center; background: #050505; 
            border-top: 1px solid rgba(255,255,255,0.05); margin-top: 80px; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">FERDI WESKER</div>
        <div style="color: var(--primary); font-weight: bold; letter-spacing: 2px;">LIVE FEED</div>
    </nav>

    <div class="hero">
        <h1>TRANSMISSIONS</h1>
        <p style="color: var(--primary); font-weight: bold; letter-spacing: 4px;">GLOBAL SATURATION STATUS: ACTIVE</p>
    </div>

    <div class="container">
        <h2 class="section-title">Latest Videos</h2>
        <div id="video-grid">
            <p style="text-align: center; grid-column: 1/-1; opacity: 0.5;">Accessing Database...</p>
        </div>
    </div>

    <footer>
        <p>© 2026 FERDI WESKER. COMPLETE GLOBAL SATURATION.</p>
    </footer>

    <script>
        // Senin Kanal ID'n: Ferdi Wesker 2
        const channelID = "UC_gBbeFVg61_vb8yBiCqU3Q"; 
        const videoGrid = document.getElementById('video-grid');
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`;
        
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`)
            .then(res => res.json())
            .then(data => {
                videoGrid.innerHTML = '';
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const videoId = item.link.split('v=')[1];
                        const card = `
                            <div class="video-card">
                                <div class="thumb-container">
                                    <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${videoId}/mqdefault.jpg'">
                                </div>
                                <div class="video-info">
                                    <h4>${item.title}</h4>
                                    <a href="${item.link}" target="_blank" class="watch-btn">STREAM DATA</a>
                                </div>
                            </div>
                        `;
                        videoGrid.innerHTML += card;
                    });
                } else {
                    videoGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No videos found. Upload content to start saturation.</p>';
                }
            })
            .catch(() => {
                videoGrid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1;">Sync failed. Check connection.</p>';
            });
    </script>
</body>
</html>
