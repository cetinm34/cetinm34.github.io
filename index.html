        .v-card { background: #0d0d0d; border: 1px solid #222; }
        .v-player { width: 100%; aspect-ratio: 16/9; }
        .v-player iframe { width: 100%; height: 100%; border:0; }
        .v-title { padding: 15px; font-family: 'Anton'; color: #fff; border-top: 2px solid var(--primary); }
