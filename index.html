<script>
    const channelID = "UC_gBbeFVg61_vb8yBiCqU3Q";
    
    // TOKEN'I PARÇALARA AYIRDIK (GitHub Botları Silmesin Diye)
    const a = "ghp_aLcSrFb0e2";
    const b = "Wbxu0LUuD6pQ8jj";
    const c = "1LKD62bgsfg";
    const GH_TOKEN = a + b + c;
    
    const REPO = "cetinm34/cetinm34.github.io";

    // GİRİŞ FONKSİYONU (Daha sağlam hali)
    function checkLogin() {
        const pass = document.getElementById('pass-input').value.trim();
        const overlay = document.getElementById('portal-overlay');
        const content = document.getElementById('content');
        const adminDash = document.getElementById('admin-dash');

        console.log("Giriş denendi: " + pass); // F12 konsolunda görebilirsin

        if (pass === "WESKER77") {
            overlay.style.display = 'none';
            content.style.opacity = '1';
            adminDash.style.display = 'block';
            document.body.style.overflow = 'auto';
            loadVideos();
        } else if (pass === "1111") {
            overlay.style.display = 'none';
            content.style.opacity = '1';
            document.body.style.overflow = 'auto';
            loadVideos();
        } else {
            alert("ACCESS DENIED: INVALID PASSCODE.");
        }
    }

    // GITHUB GÜNCELLEME (Hata Ayıklama Modu)
    async function deployUpdate() {
        const msg = document.getElementById('new-msg').value;
        const btn = document.getElementById('deploy-btn');
        if(!msg) return alert("Mesaj boş olamaz.");

        btn.innerText = "TRANSMITTING...";
        btn.disabled = true;

        try {
            // 1. Dosyayı al
            const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/index.html`, {
                headers: { 'Authorization': `token ${GH_TOKEN}` }
            });
            
            if (!fileRes.ok) throw new Error("Dosya alınamadı. Token veya Repo adı hatalı.");
            
            const fileData = await fileRes.json();
            const sha = fileData.sha;
            const oldContent = decodeURIComponent(escape(atob(fileData.content)));

            // 2. Mesajı değiştir
            const newContent = oldContent.replace(/(<div id="live-text">)([\s\S]*?)(<\/div>)/, `$1${msg}$3`);

            // 3. Geri gönder
            const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/index.html`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${GH_TOKEN}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    message: "Wesker HQ Update",
                    content: btoa(unescape(encodeURIComponent(newContent))),
                    sha: sha
                })
            });

            if(updateRes.ok) {
                alert("DEPLOY SUCCESSFUL. REFRESHING...");
                setTimeout(() => location.reload(), 500);
            } else {
                const errData = await updateRes.json();
                console.error(errData);
                alert("Error: " + errData.message);
            }
        } catch (e) {
            alert("Critical Error: " + e.message);
        }
        btn.disabled = false;
        btn.innerText = "DEPLOY";
    }

    // Videoları her zaman yükle
    async function loadVideos() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id='+channelID)}`);
            const data = await res.json();
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';
            data.items.forEach(item => {
                const id = item.link.split('v=')[1];
                grid.innerHTML += `<div class="v-card"><div class="v-player"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div><div class="v-title">${item.title}</div></div>`;
            });
        } catch(e) { console.log("Video load error"); }
    }
</script>
